name: Build libnode

on:
  workflow_dispatch:

env:
  PRIVATE_SOURCE_REPOSITORY: moluopro/nodejs
  NODE_BRANCH: v24.x
  MACOSX_DEPLOYMENT_TARGET: "10.15"
  IOS_DEPLOYMENT_TARGET: "16.0"
  ANDROID_API: "28"
  ANDROID_NDK_VERSION: "28.2.13676358"

jobs:
  macos:
    name: macOS
    runs-on: macos-26
    steps:
      - name: Checkout private build source
        uses: actions/checkout@v5
        with:
          repository: ${{ env.PRIVATE_SOURCE_REPOSITORY }}
          token: ${{ secrets.MY_KEY || vars.MY_KEY }}
          path: source
          fetch-depth: 1

      - name: Build
        working-directory: source
        run: |
          JOBS="$(sysctl -n hw.ncpu)"
          shell/build-mac.sh \
            --branch "${NODE_BRANCH}" \
            --deployment-target "${MACOSX_DEPLOYMENT_TARGET}" \
            --dest-cpu arm64 \
            --jobs "${JOBS}"

      - name: Package macOS artifact
        working-directory: source
        run: |
          mkdir -p packages/libnode-macos
          cp -R build/macos packages/libnode-macos/macos

      - name: Upload macOS package
        uses: actions/upload-artifact@v6
        with:
          name: libnode-macos
          path: source/packages/libnode-macos
          if-no-files-found: error
          retention-days: 2

  ios:
    name: iOS
    runs-on: macos-26
    steps:
      - name: Checkout private build source
        uses: actions/checkout@v5
        with:
          repository: ${{ env.PRIVATE_SOURCE_REPOSITORY }}
          token: ${{ secrets.MY_KEY || vars.MY_KEY }}
          path: source
          fetch-depth: 1

      - name: Build
        working-directory: source
        run: |
          JOBS="$(sysctl -n hw.ncpu)"
          shell/build-ios.sh \
            --branch "${NODE_BRANCH}" \
            --sdk iphoneos \
            --deployment-target "${IOS_DEPLOYMENT_TARGET}" \
            --dest-cpu arm64 \
            --jobs "${JOBS}"

      - name: Package iOS artifact
        working-directory: source
        run: |
          mkdir -p packages/libnode-ios
          cp -R build/ios packages/libnode-ios/ios

      - name: Upload iOS package
        uses: actions/upload-artifact@v6
        with:
          name: libnode-ios
          path: source/packages/libnode-ios
          if-no-files-found: error
          retention-days: 2

  android:
    name: Android
    runs-on: macos-26
    steps:
      - name: Checkout private build source
        uses: actions/checkout@v5
        with:
          repository: ${{ env.PRIVATE_SOURCE_REPOSITORY }}
          token: ${{ secrets.MY_KEY || vars.MY_KEY }}
          path: source
          fetch-depth: 1

      - name: Install Android NDK
        run: |
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "${SDKMANAGER}" ]; then
            SDKMANAGER="$(command -v sdkmanager)"
          fi
          yes | "${SDKMANAGER}" --licenses
          yes | "${SDKMANAGER}" --install "ndk;${ANDROID_NDK_VERSION}"

      - name: Build
        working-directory: source
        run: |
          JOBS="$(sysctl -n hw.ncpu)"
          shell/build-android.sh \
            --branch "${NODE_BRANCH}" \
            --sdk "${ANDROID_HOME}" \
            --ndk "${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}" \
            --api "${ANDROID_API}" \
            --dest-cpu arm64 \
            --jobs "${JOBS}"

      - name: Package Android artifact
        working-directory: source
        run: |
          mkdir -p packages/libnode-android
          cp -R build/android packages/libnode-android/android

      - name: Upload Android package
        uses: actions/upload-artifact@v6
        with:
          name: libnode-android
          path: source/packages/libnode-android
          if-no-files-found: error
          retention-days: 2

  package:
    name: Package
    runs-on: macos-26
    needs:
      - macos
      - ios
      - android
    steps:
      - name: Download platform packages
        uses: actions/download-artifact@v6
        with:
          pattern: libnode-*
          path: package-artifacts

      - name: Rebuild build tree
        run: |
          mkdir -p build
          cp -R package-artifacts/libnode-macos/macos build/macos
          cp -R package-artifacts/libnode-ios/ios build/ios
          cp -R package-artifacts/libnode-android/android build/android

      - name: Upload all-platforms package
        uses: actions/upload-artifact@v6
        with:
          name: libnode
          path: build
          if-no-files-found: error
          retention-days: 2
