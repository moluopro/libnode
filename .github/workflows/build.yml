name: Build libnode

on:
  workflow_dispatch:

env:
  SOURCE_REPOSITORY: moluopro/nodejs
  NODE_BRANCH: v24.x
  MACOSX_DEPLOYMENT_TARGET: "10.15"
  IOS_DEPLOYMENT_TARGET: "16.0"
  ANDROID_API: "28"
  ANDROID_NDK_VERSION: "28.2.13676358"

jobs:
  macos:
    name: macOS
    runs-on: macos-26
    steps:
      - &checkout-source
        name: Checkout source
        uses: actions/checkout@v6
        with:
          repository: ${{ env.SOURCE_REPOSITORY }}
          token: ${{ secrets.MY_KEY || vars.MY_KEY }}
          path: source
          fetch-depth: 1

      - name: Build
        working-directory: source
        run: |
          JOBS="$(sysctl -n hw.ncpu)"
          shell/build-mac.sh \
            --branch "${NODE_BRANCH}" \
            --deployment-target "${MACOSX_DEPLOYMENT_TARGET}" \
            --dest-cpu arm64 \
            --jobs "${JOBS}"

      - name: Upload macOS package
        uses: actions/upload-artifact@v6
        with:
          name: libnode-macos
          path: source/build/macos
          if-no-files-found: error
          retention-days: 2

  ios:
    name: iOS
    runs-on: macos-26
    steps:
      - *checkout-source

      - name: Build
        working-directory: source
        run: |
          JOBS="$(sysctl -n hw.ncpu)"
          shell/build-ios.sh \
            --branch "${NODE_BRANCH}" \
            --sdk iphoneos \
            --deployment-target "${IOS_DEPLOYMENT_TARGET}" \
            --dest-cpu arm64 \
            --jobs "${JOBS}"

      - name: Upload iOS package
        uses: actions/upload-artifact@v6
        with:
          name: libnode-ios
          path: source/build/ios
          if-no-files-found: error
          retention-days: 2

  android:
    name: Android
    runs-on: macos-26
    steps:
      - *checkout-source

      - name: Install Android NDK
        run: |
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "${SDKMANAGER}" ]; then
            SDKMANAGER="$(command -v sdkmanager)"
          fi
          yes | "${SDKMANAGER}" --licenses
          yes | "${SDKMANAGER}" --install "ndk;${ANDROID_NDK_VERSION}"

      - name: Build
        working-directory: source
        run: |
          JOBS="$(sysctl -n hw.ncpu)"
          shell/build-android.sh \
            --branch "${NODE_BRANCH}" \
            --sdk "${ANDROID_HOME}" \
            --ndk "${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}" \
            --api "${ANDROID_API}" \
            --dest-cpu arm64 \
            --jobs "${JOBS}"

      - name: Upload Android package
        uses: actions/upload-artifact@v6
        with:
          name: libnode-android
          path: source/build/android
          if-no-files-found: error
          retention-days: 2

  linux:
    name: Linux
    runs-on: ubuntu-22.04
    steps:
      - *checkout-source

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-12 g++-12 make python3 python3-pip

      - name: Build
        working-directory: source
        run: |
          JOBS="$(nproc)"
          export CC=gcc-12
          export CXX=g++-12
          shell/build-linux.sh \
            --branch "${NODE_BRANCH}" \
            --dest-cpu x64 \
            --jobs "${JOBS}"

      - name: Upload Linux package
        uses: actions/upload-artifact@v6
        with:
          name: libnode-linux
          path: source/build/linux
          if-no-files-found: error
          retention-days: 2

  windows:
    name: Windows
    runs-on: windows-2022
    steps:
      - *checkout-source

      - name: Build
        working-directory: source
        shell: pwsh
        run: |
          $Jobs = [Environment]::ProcessorCount
          ./shell/build-windows.ps1 `
            -Branch "${env:NODE_BRANCH}" `
            -DestCpu x64 `
            -Jobs $Jobs

      - name: Upload Windows symbols package
        uses: actions/upload-artifact@v6
        with:
          name: libnode-windows-symbols
          path: source/build/windows/x64/symbols
          if-no-files-found: error
          retention-days: 2

      - name: Remove Windows symbols
        working-directory: source
        shell: pwsh
        run: Remove-Item -Path build/windows/x64/symbols -Recurse -Force

      - name: Upload Windows package
        uses: actions/upload-artifact@v6
        with:
          name: libnode-windows
          path: source/build/windows
          if-no-files-found: error
          retention-days: 2

  package:
    name: Package
    runs-on: ubuntu-latest
    needs:
      - macos
      - ios
      - android
      - linux
      - windows
    steps:
      - *checkout-source

      - name: Download platform packages
        uses: actions/download-artifact@v7
        with:
          pattern: libnode-*
          path: package-artifacts

      - name: Rebuild build tree
        run: |
          mkdir -p build/include
          mv package-artifacts/libnode-macos build/macos
          mv package-artifacts/libnode-ios build/ios
          mv package-artifacts/libnode-android build/android
          mv package-artifacts/libnode-linux build/linux
          mv package-artifacts/libnode-windows build/windows
          INCLUDE_DIR="$(find build -path '*/include/node_api.h' -print -quit)"
          if [ -z "${INCLUDE_DIR}" ]; then
            echo "No Node.js include directory found in platform artifacts" >&2
            exit 1
          fi
          INCLUDE_DIR="$(dirname "${INCLUDE_DIR}")"
          rsync -a --include='*/' --include='*.h' --exclude='*' "${INCLUDE_DIR}/" build/include/
          find build -mindepth 3 -type d -name include -prune -exec rm -rf {} +
          cp source/patch/windows/bundle-libnode.props build/windows/x64/libnode.props
          cp source/patch/windows/bundle-libnode.cmake build/windows/x64/libnode.cmake
          mkdir -p package-upload
          mv build package-upload/libnode

      - name: Upload all-platforms package
        uses: actions/upload-artifact@v6
        with:
          name: libnode
          path: package-upload
          if-no-files-found: error
          retention-days: 2
