name: Build libnode

on:
  workflow_dispatch:

env:
  SOURCE_REPOSITORY: moluopro/nodejs
  NODE_BRANCH: v24.x
  MACOSX_DEPLOYMENT_TARGET: "10.15"
  IOS_DEPLOYMENT_TARGET: "16.0"
  ANDROID_API: "28"
  ANDROID_NDK_VERSION: "28.2.13676358"

jobs:
  macos:
    name: macOS
    runs-on: macos-26
    steps:
      - &checkout-source
        name: Checkout source
        uses: actions/checkout@v6
        with:
          repository: ${{ env.SOURCE_REPOSITORY }}
          token: ${{ secrets.MY_KEY || vars.MY_KEY }}
          path: source
          fetch-depth: 1

      - name: Build
        working-directory: source
        run: |
          JOBS="$(sysctl -n hw.ncpu)"
          shell/build-mac.sh \
            --branch "${NODE_BRANCH}" \
            --deployment-target "${MACOSX_DEPLOYMENT_TARGET}" \
            --dest-cpu arm64 \
            --jobs "${JOBS}"

      - name: Package macOS artifact
        working-directory: source
        run: |
          mkdir -p packages
          cd build
          zip -r ../packages/libnode-macos.zip macos

      - name: Upload macOS package
        uses: actions/upload-artifact@v6
        with:
          name: libnode-macos
          path: source/packages/libnode-macos.zip
          if-no-files-found: error
          retention-days: 2

  ios:
    name: iOS
    runs-on: macos-26
    steps:
      - *checkout-source

      - name: Build
        working-directory: source
        run: |
          JOBS="$(sysctl -n hw.ncpu)"
          shell/build-ios.sh \
            --branch "${NODE_BRANCH}" \
            --sdk iphoneos \
            --deployment-target "${IOS_DEPLOYMENT_TARGET}" \
            --dest-cpu arm64 \
            --jobs "${JOBS}"

      - name: Package iOS artifact
        working-directory: source
        run: |
          mkdir -p packages
          cd build
          zip -r ../packages/libnode-ios.zip ios

      - name: Upload iOS package
        uses: actions/upload-artifact@v6
        with:
          name: libnode-ios
          path: source/packages/libnode-ios.zip
          if-no-files-found: error
          retention-days: 2

  android:
    name: Android
    runs-on: macos-26
    steps:
      - *checkout-source

      - name: Install Android NDK
        run: |
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "${SDKMANAGER}" ]; then
            SDKMANAGER="$(command -v sdkmanager)"
          fi
          yes | "${SDKMANAGER}" --licenses
          yes | "${SDKMANAGER}" --install "ndk;${ANDROID_NDK_VERSION}"

      - name: Build
        working-directory: source
        run: |
          JOBS="$(sysctl -n hw.ncpu)"
          shell/build-android.sh \
            --branch "${NODE_BRANCH}" \
            --sdk "${ANDROID_HOME}" \
            --ndk "${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}" \
            --api "${ANDROID_API}" \
            --dest-cpu arm64 \
            --jobs "${JOBS}"

      - name: Package Android artifact
        working-directory: source
        run: |
          mkdir -p packages
          cd build
          zip -r ../packages/libnode-android.zip android

      - name: Upload Android package
        uses: actions/upload-artifact@v6
        with:
          name: libnode-android
          path: source/packages/libnode-android.zip
          if-no-files-found: error
          retention-days: 2

  linux:
    name: Linux
    runs-on: ubuntu-22.04
    steps:
      - *checkout-source

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-12 g++-12 make python3 python3-pip zip

      - name: Build
        working-directory: source
        run: |
          JOBS="$(nproc)"
          export CC=gcc-12
          export CXX=g++-12
          shell/build-linux.sh \
            --branch "${NODE_BRANCH}" \
            --dest-cpu x64 \
            --jobs "${JOBS}"

      - name: Package Linux artifact
        working-directory: source
        run: |
          mkdir -p packages
          cd build
          zip -r ../packages/libnode-linux.zip linux

      - name: Upload Linux package
        uses: actions/upload-artifact@v6
        with:
          name: libnode-linux
          path: source/packages/libnode-linux.zip
          if-no-files-found: error
          retention-days: 2

  windows:
    name: Windows
    runs-on: windows-2022
    steps:
      - *checkout-source

      - name: Build
        working-directory: source
        shell: pwsh
        run: |
          $Jobs = [Environment]::ProcessorCount
          ./shell/build-windows.ps1 `
            -Branch "${env:NODE_BRANCH}" `
            -DestCpu x64 `
            -Jobs $Jobs

      - name: Package Windows artifact
        working-directory: source
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force packages | Out-Null
          Compress-Archive -Path build/windows -DestinationPath packages/libnode-windows.zip -Force

      - name: Upload Windows package
        uses: actions/upload-artifact@v6
        with:
          name: libnode-windows
          path: source/packages/libnode-windows.zip
          if-no-files-found: error
          retention-days: 2

  package:
    name: Package
    runs-on: ubuntu-latest
    needs:
      - macos
      - ios
      - android
      - linux
      - windows
    steps:
      - *checkout-source

      - name: Download platform packages
        uses: actions/download-artifact@v7
        with:
          pattern: libnode-*
          path: package-artifacts

      - name: Rebuild build tree
        run: |
          find package-artifacts -name '*.zip' -print -exec unzip -q {} \;

          mkdir -p build/include
          mv macos ios android linux windows build/
          INCLUDE_DIR="$(find build -path '*/include/node_api.h' -print -quit)"
          if [ -z "${INCLUDE_DIR}" ]; then
            echo "No Node.js include directory found in platform artifacts" >&2
            exit 1
          fi
          INCLUDE_DIR="$(dirname "${INCLUDE_DIR}")"
          rsync -a --include='*/' --include='*.h' --exclude='*' "${INCLUDE_DIR}/" build/include/
          find build -mindepth 3 -type d -name include -prune -exec rm -rf {} +
          cp source/patch/windows/bundle-libnode.props build/windows/x64/libnode.props
          cp source/patch/windows/bundle-libnode.cmake build/windows/x64/libnode.cmake
          mv build libnode
          zip -r libnode.zip libnode

      - name: Upload all-platforms package
        uses: actions/upload-artifact@v6
        with:
          name: libnode
          path: libnode.zip
          if-no-files-found: error
          retention-days: 2
