name: Release libnode

on:
  workflow_dispatch:
    inputs:
      build_run_id:
        description: Successful Build libnode run id to package.
        required: true
      tag:
        description: Release tag to create.
        required: true
        default: 24.18.0
      release_name:
        description: Release title. Defaults to the tag when empty.
        required: false
      artifact_name:
        description: Aggregated artifact name from the build workflow.
        required: false
        default: libnode
      asset_name:
        description: Release asset name.
        required: false
        default: libnode.zip
      replace_existing:
        description: Delete an existing release/tag before creating this release.
        required: false
        type: boolean
        default: false

permissions:
  actions: read
  contents: write

run-name: Release ${{ inputs.tag }} from build ${{ inputs.build_run_id }}

jobs:
  release:
    name: Package and release
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      BUILD_RUN_ID: ${{ inputs.build_run_id }}
      TAG: ${{ inputs.tag }}
      RELEASE_NAME: ${{ inputs.release_name }}
      ARTIFACT_NAME: ${{ inputs.artifact_name }}
      ASSET_NAME: ${{ inputs.asset_name }}
      REPLACE_EXISTING: ${{ inputs.replace_existing }}
    steps:
      - name: Validate build run
        run: |
          set -euo pipefail

          run_info="$(gh run view "${BUILD_RUN_ID}" \
            --repo "${GITHUB_REPOSITORY}" \
            --json status,conclusion,headSha,url \
            --jq '[.status, .conclusion, .headSha, .url] | @tsv')"
          IFS=$'\t' read -r run_status run_conclusion run_head_sha run_url <<< "${run_info}"

          if [ "${run_status}" != "completed" ] || [ "${run_conclusion}" != "success" ]; then
            echo "Build run ${BUILD_RUN_ID} is ${run_status}/${run_conclusion}, expected completed/success." >&2
            exit 1
          fi

          {
            echo "BUILD_HEAD_SHA=${run_head_sha}"
            echo "BUILD_RUN_URL=${run_url}"
          } >> "${GITHUB_ENV}"

      - name: Download aggregated artifact
        run: |
          set -euo pipefail

          mkdir -p package-artifact
          gh run download "${BUILD_RUN_ID}" \
            --repo "${GITHUB_REPOSITORY}" \
            --name "${ARTIFACT_NAME}" \
            --dir package-artifact

      - name: Validate package tree
        run: |
          set -euo pipefail

          package_root="package-artifact/libnode"
          if [ ! -d "${package_root}" ]; then
            echo "Expected ${package_root} from artifact ${ARTIFACT_NAME}." >&2
            find package-artifact -maxdepth 3 -print | sort >&2
            exit 1
          fi

          required_files=(
            "${package_root}/android/arm64/libnode.a"
            "${package_root}/ios/arm64/libnode.a"
            "${package_root}/linux/x64/libnode.a"
            "${package_root}/macos/arm64/libnode.a"
            "${package_root}/ohos/arm64/libnode.a"
            "${package_root}/windows/x64/libnode.lib"
            "${package_root}/windows/x64/libnode.props"
            "${package_root}/windows/x64/libnode.cmake"
            "${package_root}/include/node_api.h"
          )

          for file in "${required_files[@]}"; do
            if [ ! -f "${file}" ]; then
              echo "Missing expected package file: ${file}" >&2
              exit 1
            fi
          done

          if find "${package_root}" -path '*/symbols/*' -print -quit | grep -q .; then
            echo "Release package must not include Windows symbols." >&2
            exit 1
          fi

      - name: Create release archive
        run: |
          set -euo pipefail

          asset_path="${RUNNER_TEMP}/${ASSET_NAME}"
          rm -f "${asset_path}"
          (
            cd package-artifact
            zip -qry "${asset_path}" libnode
          )

          sha256="$(sha256sum "${asset_path}" | awk '{print $1}')"
          {
            echo "ASSET_PATH=${asset_path}"
            echo "ASSET_SHA256=${sha256}"
          } >> "${GITHUB_ENV}"

          unzip -Z1 "${asset_path}" | sed -n '1,40p'
          test "$(unzip -Z1 "${asset_path}" | sed -n '1p')" = "libnode/"

      - name: Remove existing release
        if: ${{ inputs.replace_existing }}
        run: |
          set -euo pipefail

          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release delete "${TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --yes \
              --cleanup-tag
          elif gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" >/dev/null 2>&1; then
            gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/refs/tags/${TAG}"
          fi

      - name: Check release does not already exist
        if: ${{ inputs.replace_existing != true }}
        run: |
          set -euo pipefail

          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists. Re-run with replace_existing=true to overwrite it." >&2
            exit 1
          fi

          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists without a release. Re-run with replace_existing=true to overwrite it." >&2
            exit 1
          fi

      - name: Create GitHub release
        run: |
          set -euo pipefail

          title="${RELEASE_NAME:-${TAG}}"
          notes_file="${RUNNER_TEMP}/release-notes.md"
          cat > "${notes_file}" <<EOF
          Build run: ${BUILD_RUN_URL}
          Build workflow commit: ${BUILD_HEAD_SHA}

          Asset SHA256:

          \`\`\`
          ${ASSET_SHA256}  ${ASSET_NAME}
          \`\`\`
          EOF

          gh release create "${TAG}" "${ASSET_PATH}" \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${BUILD_HEAD_SHA}" \
            --title "${title}" \
            --notes-file "${notes_file}"
